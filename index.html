<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Melissa Berthold | Technical Writing Portfolio</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            color: white;
            background: linear-gradient(to bottom right, #0b4f6c, #7fb7c9, #f2e9d8);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 60px 20px;
        }

        h1 {
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
        }

        p.subtitle {
            font-weight: 300;
            font-size: 1.1rem;
            margin-bottom: 40px;
            text-align: center;
            max-width: 600px;
        }

        .visuals {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .visual {
            width: 260px;
            height: 160px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 12px;
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffffcc;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        footer {
            margin-top: 60px;
            font-size: 0.8rem;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <h1>Melissa Berthold</h1>
    <p class="subtitle">Technical Writing Portfolio — Modern, Clear, Coastal-Inspired</p>

    <div class="visuals">
        <div class="visual">Ocean Placeholder</div>
        <div class="visual">Sand & Sunset Placeholder</div>
        <div class="visual">Palm Silhouette Placeholder</div>
    </div>

    <footer>© 2026 Melissa Berthold</footer>
</body>
</html>
