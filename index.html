<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Melissa Berthold | Technical Writing Portfolio</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            color: white;
            background: linear-gradient(to bottom, #e8f4f8, #7fb7c9, #0b4f6c);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navigation Bar */
        nav {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px 0;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(6px);
            position: sticky;
            top: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        h1 {
            font-weight: 600;
            margin-top: 40px;
            margin-bottom: 10px;
            text-align: center;
        }

        p.subtitle {
            font-weight: 300;
            font-size: 1.1rem;
            margin-bottom: 40px;
            text-align: center;
            max-width: 600px;
        }

        .visuals {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .visual {
            width: 260px;
            height: 160px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 12px;
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffffcc;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        footer {
            margin-top: 60px;
            font-size: 0.8rem;
            opacity: 0.8;
            padding-bottom: 40px;
        }
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <nav>
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="services.html">Services</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <h1>Melissa Berthold</h1>
    <p class="subtitle">Technical Writing Portfolio — Modern, Clear, Coastal-Inspired</p>

    <div class="visuals">
        <div class="visual">Ocean Placeholder</div>
        <div class="visual">Sand & Sunset Placeholder</div>
        <div class="visual">Palm Silhouette Placeholder</div>

    <footer>© 2026 Melissa Berthold</footer>
